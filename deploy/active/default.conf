# Active slot config: copied from deploy/nginx-blue.conf or nginx-green.conf by upgrade.sh
# Initial content points to blue; run ./deploy/upgrade.sh to switch.
upstream frontend {
    server frontend-blue:3000;
}

upstream game_server {
    server game-server-blue:4000;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://game_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /rooms {
        proxy_pass http://game_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://game_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
